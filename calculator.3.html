<html><head><title>CALCULATOR WEB</title></head>
<body> <script language="JavaScript">
function calculate() {
    let exp = document.frmSum.txtSum.value;

    if (exp.includes("%")) {
        let parts = exp.split("%");
        let a = parseFloat(parts[0]);
        let b = parseFloat(parts[1]);
        document.frmSum.txtSum.value = (a / 100) * b;} 
    else if (exp.includes("x")) {
        let parts = exp.split("x");
        let c = parseFloat(parts[0]);
        let d = parseFloat(parts[1]);
        document.frmSum.txtSum.value = c*d;
    }  
    else if (exp.includes("÷")) {
        let parts = exp.split("÷");
        let e = parseFloat(parts[0]);
        let f= parseFloat(parts[1]);
        document.frmSum.txtSum.value = e/f;
    }
    else {
        document.frmSum.txtSum.value = eval(exp);
    }
}

function clearDisplay() {
    document.frmSum.txtSum.value = "";
}

function setValue(n) {
    document.frmSum.txtSum.value += n;
}
</script><center>
 <table border="3" Cellspacing="10" cellpadding="11">
 <br><br>  <form name="frmSum"><br><tr><input type="text" size="28.0" name="txtSum"style="width:251px;height:40px;font-size:24px;"></tr>
        
<tr><th><input type="button" value="1" name="n"  onClick="setValue(1)"></th>

<th><input type="button" value="2" onClick="setValue(2)" ></th>

<th><input type="button" value="3" onclick="setValue(3)"></th> 
<th ><input type="button" value="0" onClick="setValue(0)"></th></tr>

<tr><th><input type="button" value="4" onClick="setValue(4)"></th><th>
      
<input type="button" value="5" onClick="setValue(5)"></th><th>
    
<input type="button" value="6" onClick="setValue(6)"></th>
<th><input type="button" value="%" onClick="setValue('%')"></th></tr>
 <tr><th>

<input type="button" value="7" onClick="setValue(7)"></th><th>
    
<input type="button" value="8" onClick="setValue(8)"></th><th>
             
<input type="button" value="9" onClick="setValue(9)"></th><th><input type="button" value="÷" onClick="setValue('÷')"></th></tr>

<tr><th><input type="button" value="+" onClick="setValue('+')"></th>

<th><input type="button" value="-" onClick="setValue('-')"></th> 

<th><input type="button" value="x" onClick="setValue('x')"></th> 

<th><input type="button" value="AC" onClick="clearDisplay()"></th></tr>

<tr><th colspan="4"><input type="button" value="=" onClick="calculate()"></th> </tr>
</table></f></form></center></body></html>
